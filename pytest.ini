[pytest]
# 基本配置
addopts =
    -v
    --color=yes
    --tb=auto
    -s
    --alluredir=report/allure-results
    --clean-alluredir
    --disable-warnings
    -W ignore::DeprecationWarning

minversion = 6.0

# 测试发现配置
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 日志配置
log_cli = false
log_cli_level = INFO
log_file = report/logs/test.log
log_file_level = DEBUG
log_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_date_format = %Y-%m-%d %H:%M:%S
log_file_mode = w

# 标记配置
markers =
    smoke: 冒烟测试
    ui: UI自动化测试
    api: 接口测试
    performance: 性能测试
    dean: Dean角色测试
    teacher: Teacher角色测试
    student: Student角色测试
    mentor: Mentor角色测试
    privacy_officer: Privacy Officer测试
    login: 登录相关
    course: 课程相关
    assignment: 作业相关
    quiz: 测验相关
    forum: 论坛相关
    grading: 评分相关
    user_mgmt: 用户管理
    privacy: 隐私相关

# 路径配置
testpaths = testcase
norecursedirs = .venv .git __pycache__ build dist pytest_cache temp report performance/jmx performance/data

# 失败重跑配置
reruns = 0
reruns_delay = 2
